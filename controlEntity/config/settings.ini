[HMI]
sampling_rate_ms = 100
address = 1

[Evoflow]
port_windows = COM6
port_linux = /dev/serial/by-id/usb-FTDI_FT230X_Basic_UART_DK0GU7KF-if00-port0
serial_timeout = 0.05
baudrate = 921600
address = 100

[SampleExtraction]
port_windows = COM7
port_linux = /dev/ttyUSB1
serial_timeout = 0.5
baudrate = 921600
address = 101

[defaultValues]
pump1_rpm = 2.00
pump2_rpm = 3.00
pump3_rpm = 1.50
pump4_rpm = 2.50
magneticStirrer_bioreactor_rpm = 150.00
magneticStirrer_lagoon_rpm = 100.00
tempCtrl_bioreactor_sp = 37.00
tempCtrl_lagoon_sp = 37.00

[defaultComponentStatus]
pump1_status = True
pump2_status = True
pump3_status = True
pump4_status = True
magneticStirrer_bioreactor_status = True
magneticStirrer_lagoon_status = True
tempCtrl_bioreactor_status = True
tempCtrl_lagoon_status = True
od_bioreactor_status = True
od_lagoon_status = True
phtCount_status = True
sug2lagValve_status = True
bio2lagValve_status = True

[flowRateConversionFactors]
pump_1 = 1.0
pump_2 = 1.0
pump_3 = 1.0
pump_4 = 1.0

[plotConfiguration]
timespan_minutes = 5
sampling_time_seconds = 5
y_axis_flowRate_min = 0
y_axis_flowRate_max = 5
y_axis_phtCount_min = 0
y_axis_phtCount_max = 130
y_axis_temp_min = 25
y_axis_temp_max = 40
y_axis_od_min = 0
y_axis_od_max = 1.5

[dataLogging]
max_rows_per_db = 10000
